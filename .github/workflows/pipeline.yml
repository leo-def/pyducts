name: 🐍 Pyducts CI/CD Demo

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: '🚀 Forçar deploy ignorando bloqueadores do PR?'
        required: true
        type: boolean
        default: false

jobs:
  # 🧪 CI: Quality Checks
  quality-checks:
    name: 🛡️ Quality & Security
    runs-on: ubuntu-latest
    env:
      SHOW_EXECUTION_CONTEXT: true
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: 🔍 Linting (Ruff)
        run: |
          echo "::group::Running Ruff"
          ruff check .
          echo "::endgroup::"

      - name: 🧪 Unit Tests (Pytest)
        run: |
          echo "::group::Running Pytest"
          PYTHONPATH=. pytest
          echo "::endgroup::"

  # 🚧 Gating: Verification of PR Instructions
  deployment-gate:
    name: 🚥 Deployment Gate (Instruction Carrier)
    # Pula o SCAN se for disparado manualmente com o "Force Deploy" ativo
    if: github.event_name == 'pull_request' && github.event.inputs.force_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🧐 Analyzing PR Description for Blockers
        id: scanner
        run: |
          BODY="${{ github.event.pull_request.body }}"
          
          echo "--------------------------------------------------------"
          echo "🔍 Scanning for Mandatory Manual Instructions..."
          echo "--------------------------------------------------------"
          
          DB_BLOCK=$(echo "$BODY" | grep -ci "\[x\] \*\*\[DB_MIGRATION\]\*\*" || true)
          ENV_BLOCK=$(echo "$BODY" | grep -ci "\[x\] \*\*\[ENV_CHANGE\]\*\*" || true)
          MANUAL_BLOCK=$(echo "$BODY" | grep -ci "\[x\] \*\*\[BLOCK\]\*\*" || true)
          
          TOTAL_BLOCKS=$((DB_BLOCK + ENV_BLOCK + MANUAL_BLOCK))
          
          if [ "$TOTAL_BLOCKS" -gt 0 ]; then
            echo "🚫 DEPLOYMENT IS BLOCKED: $TOTAL_BLOCKS manual instructions found."
            exit 1
          else
            echo "✅ NO BLOCKERS FOUND."
          fi

  # 🚀 Deploy: The Demo Output
  production-deployment:
    name: 🚀 Production Promotion
    needs: [quality-checks, deployment-gate]
    if: always() && needs.quality-checks.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 📡 Evaluating Promotion Feasibility
        run: |
          GATE_RESULT="${{ needs.deployment-gate.result }}"
          FORCE_DEPLOY="${{ github.event.inputs.force_deploy }}"
          EVENT_NAME="${{ github.event_name }}"
          
          # Lógica de decisão: Sucesso, Manual (Bypass) ou Skip (Push)
          if [ "$GATE_RESULT" == "success" ] || [ "$GATE_RESULT" == "skipped" ] || [ "$FORCE_DEPLOY" == "true" ]; then
            echo "=========================================================="
            echo "🟢 PROMOTING TO PRODUCTION"
            echo "=========================================================="
            if [ "$FORCE_DEPLOY" == "true" ]; then
                echo "⚡ [MANUAL BYPASS] Gates ignored by user intervention."
            elif [ "$GATE_RESULT" == "skipped" ]; then
                echo "ℹ️  [AUTO-PATH] No PR context found ($EVENT_NAME). Proceeding."
            fi
            echo "🚀 [SUCCESS] Code deployed to production!"
            echo "=========================================================="
          else
            echo "=========================================================="
            echo "🟡 WAITING FOR MANUAL COMPLIANCE"
            echo "=========================================================="
            echo "⚠️ [BLOCKED] Deployment halted by Instruction Carrier rules."
            echo "💡 Use 'workflow_dispatch' with 'force_deploy' to bypass if ready."
            echo "=========================================================="
            exit 1 
          fi
